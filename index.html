<!DOCTYPE html>
<html>
  <head>
    <title>about:blank</title>
  </head>
  <body>
    <button onclick="openPage('https://example.org/')">Go</button>

    <script>
      function openPage(url) {
        const win = window.open("", "_blank");

        if (!win) {
          alert("Popup blocked!");
          return;
        }

        win.document.write(`
          <!DOCTYPE html>
          <html>
            <head>
              <title>Loading...</title>
              <style>
                html, body {
                  margin: 0;
                  padding: 0;
                  height: 100%;
                  overflow: hidden;
                }
                iframe {
                  border: none;
                  width: 100%;
                  height: 100%;
                }
              </style>
            </head>
            <body>
              <iframe src="${url}"></iframe>
            </body>
          </html>
        `);

        win.document.close();
      }
    </script>
  </body>
</html>
