
<!DOCTYPE html>
<html>
  <head>
    <title>about:blank</title>
  </head>
  <body>
    <input type="text" id="urlInput" placeholder="Enter URL (https://...)" style="width:300px;">
    <button onclick="openPage()">Go</button>

    <script>
      function normalizeUrl(url) {
        if (!url.startsWith("http://") && !url.startsWith("https://")) {
          return "https://" + url;
        }
        return url;
      }

      function openPage() {
        let url = document.getElementById("urlInput").value.trim();
        if (!url) return;

        url = normalizeUrl(url);

        const win = window.open("", "_blank");

        if (!win) {
          alert("Popup blocked!");
          return;
        }

        win.document.write(`
          <!DOCTYPE html>
          <html>
            <head>
              <title>Loading...</title>
              <style>
                html, body {
                  margin: 0;
                  padding: 0;
                  height: 100%;
                  overflow: hidden;
                }
                iframe {
                  border: none;
                  width: 100%;
                  height: 100%;
                }
              </style>
            </head>
            <body>
              <iframe id="frame" src="${url}"></iframe>

              <script>
                const frame = document.getElementById("frame");

                // Attempt to keep navigation inside iframe
                frame.onload = function() {
                  try {
                    const links = frame.contentDocument.querySelectorAll("a");

                    links.forEach(link => {
                      link.addEventListener("click", function(e) {
                        e.preventDefault();
                        frame.src = this.href;
                      });
                    });
                  } catch (e) {
                    // Will fail on most external sites due to cross-origin restrictions
                    console.warn("Cross-origin - cannot intercept links.");
                  }
                };
              <\/script>
            </body>
          </html>
        `);

        win.document.close();
      }
    </script>
  </body>
</html>
